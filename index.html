<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiseLevis | Coming Soon</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 650px;
            padding: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        .tagline {
            font-size: 0.9rem;
            letter-spacing: 3px;
            opacity: 0.6;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: #38bdf8;
            margin: 25px auto;
            border-radius: 2px;
        }

        .contact {
            font-size: 1rem;
            margin-top: 20px;
            opacity: 0.85;
        }

        .email {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
        }

        .email:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="logo">WISELEVIS</div>
        <div class="tagline">INNOVATION • QUALITY • TRUST</div>

        <h1>Coming Soon</h1>

        <p class="subtitle">
            Our website is currently under construction.<br>
            We’re working on something exceptional.
        </p>

        <div class="divider"></div>

        <p class="contact">
            If you have any inquiries, please email<br>
            <a class="email" href="mailto:info@wiselevis.com">info@wiselevis.com</a>
        </p>

        <div class="footer">
            © 2026 WiseLevis. All rights reserved.
        </div>

    </div>
</body>
</html>
